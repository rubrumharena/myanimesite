{% load static %}

<div id="user-library-popover" class="w-64 bg-[#2E2A30] p-2.5 rounded-2xl border-0 hidden z-100 transition duration-200">
    <div class="flex flex-col gap-1.5 mb-1.5">
        <button data-target="create-folder-popup" class="popover-button gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="1.4rem" height="1.4rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tabler-icon tabler-icon-plus ">
                <path d="M12 5l0 14"></path>
                <path d="M5 12l14 0"></path>
            </svg>
            Создать плейлист
        </button>
        
        <label for="favorites" class="popover-button gap-1.5 select-none">
            <input id="favorites" type="checkbox" class="peer hidden">
            <svg class="peer-checked:fill-red-500 transition-colors duration-200" viewBox="0 0 21 21" width="1.4rem" height="1.4rem" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M16.7501 11.1587L10.5001 17.3487L4.25009 11.1587C3.83784 10.7575 3.51312 10.2754 3.29638 9.74256C3.07963 9.20975 2.97556 8.63782 2.9907 8.06281C3.00585 7.4878 3.13989 6.92215 3.38439 6.40148C3.62888 5.88081 3.97853 5.41641 4.41133 5.03752C4.84412 4.65862 5.35068 4.37344 5.8991 4.19993C6.44752 4.02643 7.02593 3.96835 7.59789 4.02937C8.16986 4.09038 8.723 4.26916 9.22248 4.55445C9.72196 4.83975 10.157 5.22537 10.5001 5.68703C10.8447 5.22872 11.2802 4.84647 11.7793 4.5642C12.2785 4.28194 12.8305 4.10574 13.4009 4.04663C13.9712 3.98752 14.5477 4.04678 15.0941 4.22069C15.6405 4.3946 16.1451 4.67943 16.5764 5.05733C17.0077 5.43524 17.3563 5.8981 17.6004 6.41694C17.8446 6.93578 17.979 7.49943 17.9953 8.07262C18.0117 8.64581 17.9095 9.21619 17.6952 9.74807C17.4809 10.28 17.1592 10.7619 16.7501 11.1637"></path>
            </svg>
            <span class="peer-checked:hidden">Добавить в избранное</span>
            <span class="hidden peer-checked:inline">Удалить из избранного</span>
        </label>
    </div>

    <ul id="user-folders" class="max-h-42 h-full w-full overflow-y-auto min-h-0">
    </ul>
</div>
