<dialog id="{{ id }}-alert-popup"
        class="m-auto p-8 w-[700px] bg-secondary rounded-4xl border border-[#2b2c2d]">

    <h3 class="!text-pink-600 font-bold mb-2">
        Вы абсолютно уверены?
    </h3>

    <p>{{ text }}{{ url }}</p>

    <div class="flex justify-end gap-6 mt-4">
        <button class="close-modal flex-center rounded-2xl border-[0.1rem] border-white py-2 px-4">
            Отмена
        </button>

        <form action="{{ url }}" method="POST" class="flex-center">
            {% csrf_token %}
            <button type="submit" class="!text-pink-600">
                Да, удалить
            </button>
        </form>
    </div>
</dialog>
