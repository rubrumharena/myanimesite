{% load static %}

<div id="search-popup" class="overlay overflow-y-auto invisible">
    <div class="modal-content w-[800px] h-[900px]">
        <div class="mx-8 flex items-center justify-center gap-2 relative">
            <div class="relative w-full flex-1">
                <label for="title-search"></label>
                <input id="title-search" class="w-full gap-14 p-4 rounded-4xl bg-transparent border-[0.1rem] border-[#2b2c2d] focus:border-white pr-32" placeholder="Поиск аниме...">

                <div class="absolute right-5 top-1/2 -translate-y-1/2 flex items-center">
                    <button class="mr-4" onclick="document.getElementById('title-search').value = ''">
                        <svg class="fill-text-gray " width="2.5rem" height="2.5rem" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M16.9498 8.46447C17.3404 8.07394 17.3404 7.44078 16.9498 7.05025C16.5593 6.65973 15.9261 6.65973 15.5356 7.05025L12.0001 10.5858L8.46455 7.05025C8.07402 6.65973 7.44086 6.65973 7.05033 7.05025C6.65981 7.44078 6.65981 8.07394 7.05033 8.46447L10.5859 12L7.05033 15.5355C6.65981 15.9261 6.65981 16.5592 7.05033 16.9497C7.44086 17.3403 8.07402 17.3403 8.46455 16.9497L12.0001 13.4142L15.5356 16.9497C15.9261 17.3403 16.5593 17.3403 16.9498 16.9497C17.3404 16.5592 17.3404 15.9261 16.9498 15.5355L13.4143 12L16.9498 8.46447Z"></path>
                        </svg>
                    </button>
                    <button>
                        <svg xmlns="http://www.w3.org/2000/svg" width="1.7rem" height="1.7rem" viewBox="0 0 24 24" fill="none" stroke="#a2a3a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path>
                            <path d="M21 21l-6 -6"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <button data-action-close class="close-button">
                <svg class="fill-text-gray" width="2.5rem" height="2.5rem" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M16.9498 8.46447C17.3404 8.07394 17.3404 7.44078 16.9498 7.05025C16.5593 6.65973 15.9261 6.65973 15.5356 7.05025L12.0001 10.5858L8.46455 7.05025C8.07402 6.65973 7.44086 6.65973 7.05033 7.05025C6.65981 7.44078 6.65981 8.07394 7.05033 8.46447L10.5859 12L7.05033 15.5355C6.65981 15.9261 6.65981 16.5592 7.05033 16.9497C7.44086 17.3403 8.07402 17.3403 8.46455 16.9497L12.0001 13.4142L15.5356 16.9497C15.9261 17.3403 16.5593 17.3403 16.9498 16.9497C17.3404 16.5592 17.3404 15.9261 16.9498 15.5355L13.4143 12L16.9498 8.46447Z"></path>
                </svg>
            </button>
        </div>

        <div class="w-full h-full">
            <p id="title-search-annotation" class="py-4 px-16 hidden">Результаты для "<span class="font-bold"></span>"</p>
            <div class="max-h-[700px] h-full w-full overflow-y-auto px-16 min-h-0 relative">
                <div class="nothing-found">
                    <h5 class="mb-4 text-[1.4rem] font-bold">Тут пока ничего нет</h5>
                    <img class="rounded-2xl w-[380px] h-[210px]" src="{% static 'vendor/img/gifs/loupe.gif' %}" alt="Find an ">
                </div>
                <ul id="title-search-result" class="flex flex-col w-full mt-8 gap-6 pb-8">
                </ul>
            </div>
        </div>
    </div>
</div>
