{% load static %}

<div id="collections-popup" class="overlay overflow-y-auto invisible">
    <div class="modal-content w-[750px] h-[800px]">

        <div class="mx-8 flex items-end relative items-center">
            <h2 class="text-5xl font-bold">Списки</h2>
            <ul class="ml-auto flex items-center justify-center w-fit gap-2 h-full">
                <li>
                    <input type="radio" name="collections" id="{{ collections.genre }}" checked class="hidden peer"/>
                    <label for="{{ collections.genre }}" class="standard-button !transition-colors text-[1rem] flex-center cursor-pointer bg-[#f0f0f0] min-w-20 !h-10 rounded-2xl peer-checked:bg-[#3a3a3a] peer-checked:!text-[#20201d] select-none !text-black">
                        Жанры
                    </label>
                </li>
                <li class="!transition-colors">
                    <input type="radio" name="collections" id="{{ collections.movie }}" class="hidden peer"/>
                    <label for="{{ collections.movie }}" class="standard-button !transition-colors text-[1rem] flex-center cursor-pointer bg-[#f0f0f0] min-w-20 !h-10 rounded-2xl peer-checked:bg-[#3a3a3a] peer-checked:!text-[#20201d] select-none !text-black">
                        Фильмы
                    </label>
                </li>
                <li>
                    <input type="radio" name="collections" id="{{ collections.series }}" class="hidden peer"/>
                    <label for="{{ collections.series }}" class="standard-button !transition-colors text-[1rem] flex-center cursor-pointer bg-[#f0f0f0] min-w-20 !h-10 rounded-2xl peer-checked:bg-[#3a3a3a] peer-checked:!text-[#20201d] select-none !text-black">
                        Сериалы
                    </label>
                </li>
                <li>
                    <input type="radio" name="collections" id="{{ collections.year }}" class="hidden peer"/>
                    <label for="{{ collections.year }}" class="standard-button !transition-colors text-[1rem] flex-center cursor-pointer bg-[#f0f0f0] min-w-20 !h-10 rounded-2xl peer-checked:bg-[#3a3a3a] peer-checked:!text-[#20201d] select-none !text-black">
                        Годы
                    </label>
                </li>
            </ul>
            <button data-action-close class="close-button">
                <svg class="fill-text-gray" width="2.5rem" height="2.5rem" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M16.9498 8.46447C17.3404 8.07394 17.3404 7.44078 16.9498 7.05025C16.5593 6.65973 15.9261 6.65973 15.5356 7.05025L12.0001 10.5858L8.46455 7.05025C8.07402 6.65973 7.44086 6.65973 7.05033 7.05025C6.65981 7.44078 6.65981 8.07394 7.05033 8.46447L10.5859 12L7.05033 15.5355C6.65981 15.9261 6.65981 16.5592 7.05033 16.9497C7.44086 17.3403 8.07402 17.3403 8.46455 16.9497L12.0001 13.4142L15.5356 16.9497C15.9261 17.3403 16.5593 17.3403 16.9498 16.9497C17.3404 16.5592 17.3404 15.9261 16.9498 15.5355L13.4143 12L16.9498 8.46447Z"></path>
                </svg>
            </button>
        </div>
    
        <ul id="collections-list" class="flex flex-col w-full gap-6 mt-10 px-12 min-h-0 max-h-[700px] overflow-y-auto py-5">
        </ul>

        <div class="nothing-found hidden">
            <h5 class="mb-4 text-[1.4rem] font-bold">Тут пока ничего нет</h5>
            <img class="rounded-2xl w-[380px] h-[210px]" src="{% static 'vendor/img/nothing_found1.jpg' %}" alt="Nothing found">
        </div>

    </div>
</div>
